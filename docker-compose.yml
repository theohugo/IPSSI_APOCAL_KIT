# ============================================================================
# IPSSI_APOCAL_KIT — docker-compose.yml
# ----------------------------------------------------------------------------
# K0 (actuel) : postgres + ollama uniquement (services d'infrastructure).
# K1 ajoutera : backend (Django).
# K3 ajoutera : frontend (React Vite).
#
# Lancer : docker compose up -d
# Puis :   make pull-model
# ============================================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: apocal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-apocal}
      POSTGRES_USER:     ${POSTGRES_USER:-apocal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apocal-dev-only}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apocal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: apocal-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Sur GPU NVIDIA, décommenter pour accélérer :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: apocal-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # --------------------------------------------------------------------------
  # K3 ajoutera :
  #
  # frontend:
  #   build: { context: ./frontend, dockerfile: ../docker/frontend.Dockerfile }
  #   ports: ["3000:3000"]
  #   ...
  # --------------------------------------------------------------------------

volumes:
  postgres-data:
  ollama-data:
